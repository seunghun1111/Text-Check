<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Korean Text Check</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <h1>한국어 문장 검사</h1>
          <p id="selectionStatus">선택한 텍스트를 불러오는 중입니다.</p>
        </div>
      </header>

      <section class="section">
        <label class="label" for="sourceText">검사할 문장</label>
        <textarea id="sourceText" rows="6" placeholder="웹페이지에서 문장을 선택하거나 여기에 직접 입력하세요."></textarea>
        <div class="actions">
          <button id="checkButton" class="primary" type="button">검사하기</button>
          <button id="copyButton" type="button" disabled>수정 결과 복사</button>
        </div>
      </section>

      <section id="resultSection" class="section results" aria-live="polite">
        <p class="empty">검사 결과가 여기에 표시됩니다.</p>
      </section>

      <section class="section">
        <label class="label" for="exceptionInput">사용자 예외 단어</label>
        <div class="inline-form">
          <input id="exceptionInput" type="text" placeholder="예: PRMS, traceId, ADS-221">
          <button id="addExceptionButton" type="button">등록</button>
        </div>
        <div id="exceptionList" class="chips" aria-label="등록된 예외 단어"></div>
      </section>

      <section class="section">
        <div class="section-heading">
          <h2>사전 API 설정</h2>
          <label class="switch">
            <input id="enableDictionaryApi" type="checkbox">
            <span>조회 사용</span>
          </label>
        </div>
        <label class="label" for="proxyEndpoint">내부 사전 프록시 URL</label>
        <input id="proxyEndpoint" type="url" autocomplete="off" placeholder="예: https://text-check-api.internal">
        <details class="advanced-settings">
          <summary>개발용 직접 API 키 입력</summary>
          <label class="label stacked" for="krdictApiKey">한국어기초사전 API 키</label>
          <input id="krdictApiKey" type="password" autocomplete="off" placeholder="프록시가 없을 때만 입력">
          <label class="label stacked" for="opendictApiKey">우리말샘 API 키</label>
          <input id="opendictApiKey" type="password" autocomplete="off" placeholder="프록시가 없을 때만 입력">
        </details>
        <div class="actions">
          <button id="saveApiSettingsButton" type="button">API 설정 저장</button>
        </div>
        <p id="apiSettingsStatus" class="status">내부 배포에서는 프록시 URL 사용을 권장합니다.</p>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
